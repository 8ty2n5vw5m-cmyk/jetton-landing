<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jetton Bonus | Links</title>
  <style>
    :root {
      --lime: #aaff00;
      --lime-dark: #4f8f00;
      --black: #030403;
      --white: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --border: 6px;
      --radius: 30px;
      --shadow: 0 16px 0 var(--lime-dark), 0 28px 52px rgba(0, 0, 0, 0.55);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 2% 6%, rgba(170,255,0,.26) 0 28px, transparent 29px),
        radial-gradient(circle at 98% 12%, rgba(170,255,0,.22) 0 30px, transparent 31px),
        radial-gradient(circle at 6% 88%, rgba(170,255,0,.24) 0 42px, transparent 43px),
        linear-gradient(145deg, #0c1205 0%, #030303 45%, #0a0f05 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .28;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.20) 0 13px, transparent 14px),
        radial-gradient(circle, rgba(170,255,0,.20) 0 24px, transparent 25px);
      background-size: 118px 118px, 190px 190px;
      background-position: 18px 12px, 0 40px;
    }

    body::after {
      content: "";
      position: fixed;
      inset: auto auto 22px -80px;
      width: 260px;
      height: 58px;
      border-radius: 999px;
      background: rgba(170,255,0,.18);
      transform: rotate(-18deg);
      pointer-events: none;
      box-shadow: 1120px -740px 0 rgba(170,255,0,.16), 1020px 30px 0 rgba(170,255,0,.18);
    }

    .captcha-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at top, rgba(170,255,0,.34), transparent 34%),
        rgba(0,0,0,.92);
      transition: opacity .35s ease, visibility .35s ease;
    }

    .captcha-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .captcha-box {
      width: min(440px, 100%);
      padding: 28px;
      border: 5px solid var(--lime);
      border-radius: 34px;
      background: #050505;
      box-shadow: 0 0 42px rgba(170,255,0,.24);
      text-align: center;
    }

    .captcha-box h1 {
      font-size: 30px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .captcha-box p {
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .captcha-task {
      display: grid;
      gap: 14px;
      margin-bottom: 16px;
    }

    .captcha-code {
      padding: 16px;
      border: 4px solid var(--white);
      border-radius: 22px;
      background: var(--lime);
      color: #000;
      font-size: 34px;
      font-weight: 950;
      letter-spacing: 8px;
      user-select: none;
      box-shadow: 0 8px 0 var(--lime-dark);
    }

    .captcha-input {
      width: 100%;
      height: 58px;
      border: 3px solid var(--lime);
      border-radius: 18px;
      background: #000;
      color: var(--white);
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      outline: none;
      text-transform: uppercase;
    }

    .captcha-btn {
      width: 100%;
      min-height: 62px;
      border: 4px solid var(--white);
      border-radius: 20px;
      background: var(--lime);
      color: #000;
      font-size: 20px;
      font-weight: 950;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 0 var(--lime-dark);
    }

    .captcha-error {
      min-height: 20px;
      margin-top: 14px;
      color: #ff4b4b;
      font-weight: 800;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(540px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 26px;
    }

    .card {
      min-height: calc(100vh - 36px);
      padding: clamp(26px, 6vw, 42px) clamp(20px, 5vw, 34px);
      border: var(--border) solid var(--lime);
      border-radius: clamp(34px, 8vw, 56px);
      background: rgba(0, 0, 0, 0.82);
      box-shadow: inset 0 0 50px rgba(170,255,0,.05), 0 0 36px rgba(170,255,0,.18);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
    }

    .brand-block {
      display: grid;
      place-items: center;
      padding-top: 6px;
    }

    .logo-tile {
      width: min(250px, 60vw);
      aspect-ratio: 1 / .82;
      border: 8px solid var(--white);
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(170,255,0,.85), rgba(8,12,4,.92) 45%, #030303 100%);
      box-shadow: 0 12px 0 var(--lime-dark), 0 22px 28px rgba(0,0,0,.45);
      display: grid;
      place-items: center;
      transform: rotate(-2deg);
      overflow: hidden;
      position: relative;
    }

    .logo-tile::before {
      content: "JETTON";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: clamp(42px, 15vw, 72px);
      font-weight: 950;
      color: rgba(0,0,0,.22);
      letter-spacing: -5px;
    }

    .jetton-mark {
      position: relative;
      width: 78%;
      height: 48%;
      filter: drop-shadow(0 7px 5px rgba(0,0,0,.45));
    }

    .jetton-mark::before,
    .jetton-mark::after {
      content: "";
      position: absolute;
      background: linear-gradient(90deg, #d6ff59, #f4f4f4 42%, #777 72%, #c7ff00);
      clip-path: polygon(0 55%, 82% 0, 100% 20%, 20% 100%);
      border: 3px solid var(--lime);
    }

    .jetton-mark::before {
      inset: 0 0 26% 0;
      transform: skewX(-12deg);
    }

    .jetton-mark::after {
      width: 38%;
      height: 42%;
      right: 16%;
      bottom: 0;
      transform: skewX(-12deg) scale(.72);
      transform-origin: right bottom;
    }

    .main-cta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 106px;
      padding: 22px 22px;
      border: 7px solid var(--white);
      border-radius: var(--radius);
      background: var(--lime);
      color: #000;
      text-decoration: none;
      font-size: clamp(28px, 8vw, 44px);
      line-height: 1;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: -1.5px;
      box-shadow: var(--shadow);
      transition: transform .18s ease, filter .18s ease, box-shadow .18s ease;
      animation: pulse 1.75s infinite;
    }

    .buttons {
      display: grid;
      gap: 14px;
    }

    .social-btn {
      min-height: 78px;
      display: grid;
      grid-template-columns: 58px 1fr 58px;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border: 4px solid var(--lime);
      border-radius: 24px;
      background: rgba(0,0,0,.78);
      color: var(--white);
      text-decoration: none;
      text-transform: uppercase;
      font-weight: 950;
      box-shadow: 0 0 0 1px rgba(170,255,0,.18), 0 16px 30px rgba(0,0,0,.34);
      transition: transform .18s ease, background .18s ease;
    }

    .social-btn:hover,
    .main-cta:hover,
    .captcha-btn:hover {
      transform: translateY(-4px) scale(1.01);
      filter: saturate(1.14);
    }

    .social-btn:active,
    .main-cta:active,
    .captcha-btn:active {
      transform: translateY(4px);
    }

    .icon,
    .arrow {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: var(--lime);
      color: #000;
      font-size: 34px;
      font-weight: 950;
    }

    .main-cta .arrow {
      background: #000;
      color: var(--lime);
      min-width: 58px;
    }

    .copy {
      display: grid;
      gap: 3px;
      text-align: left;
      font-size: clamp(18px, 4.8vw, 27px);
      line-height: 1.08;
      letter-spacing: -.5px;
    }

    .copy span { color: var(--lime); }

    .legal {
      text-align: center;
      color: rgba(255,255,255,.42);
      font-size: 11px;
      line-height: 1.45;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: var(--shadow); }
      50% { box-shadow: 0 16px 0 var(--lime-dark), 0 0 46px rgba(170,255,0,.52); }
    }

    @media (max-width: 430px) {
      .card { gap: 22px; }
      .main-cta { min-height: 92px; padding: 18px 16px; }
      .social-btn {
        grid-template-columns: 48px 1fr 48px;
        gap: 12px;
        padding: 12px;
      }
      .icon, .arrow { width: 48px; height: 48px; border-radius: 15px; font-size: 28px; }
      .captcha-box { padding: 22px 16px; }
    }
  </style>
</head>
<body>
  <div class="captcha-screen" id="captchaScreen">
    <div class="captcha-box">
      <h1>Проверка</h1>
      <p>Введите код, чтобы открыть бонусный лендинг Jetton.</p>
      <div class="captcha-task">
        <div class="captcha-code" id="captchaCode">J7T</div>
        <input class="captcha-input" id="captchaInput" type="text" inputmode="text" autocomplete="off" placeholder="КОД" />
      </div>
      <button class="captcha-btn" id="captchaBtn">Открыть лендинг</button>
      <div class="captcha-error" id="captchaError"></div>

  </div>

        <span>Забрать 425%+250FS</span>
        <span class="arrow">➜</span>
      </a>

      <div class="buttons">
        <a class="social-btn" href="https://t.me/foxiofficials" target="_blank" rel="nofollow noopener">
          <span class="icon">✈</span>
          <span class="copy">Подпишись на мой ТГ <span>с промокодами</span></span>
          <span class="arrow">➜</span>
        </a>

        <a class="social-btn" href="https://t.me/jethub" target="_blank" rel="nofollow noopener">
          <span class="icon">✈</span>
          <span class="copy">Официальный ТГК <span>Jetton</span></span>
          <span class="arrow">➜</span>
        </a>

        <a class="social-btn" href="https://t.me/jetton_proxybot?start=cg8b4I90inI" target="_blank" rel="nofollow noopener">
          <span class="icon">⚡</span>
          <span class="copy">Бесплатное прокси <span>для TG</span></span>
          <span class="arrow">➜</span>
        </a>
      </div>

      <p class="legal">18+ Demo landing. Play responsibly.</p>
    </section>
  </main>

  <script>
    // === ROTATION CAPTCHA ===
const captchaScreen = document.getElementById('captchaScreen');
const captchaBox = document.querySelector('.captcha-box');

// Replace captcha HTML dynamically
captchaBox.innerHTML = `
  <h1>Проверка</h1>
  <p>Поверни изображение так, чтобы оно было ровным</p>
  <div style="display:grid;gap:16px;">
    <div id="captchaCircle" style="width:180px;height:180px;margin:0 auto;border-radius:50%;border:4px solid var(--lime);display:grid;place-items:center;overflow:hidden;background:#000;">
      <img id="captchaImg" src="/mnt/data/Снимок экрана 2026-04-27 в 17.39.41.png" style="width:120px;transform:rotate(0deg);transition:.2s;" />
    </div>
    <input type="range" id="captchaSlider" min="0" max="360" value="0" />
    <button class="captcha-btn" id="captchaBtn">Подтвердить</button>
    <div class="captcha-error" id="captchaError"></div>
  </div>
`;

const img = document.getElementById('captchaImg');
const slider = document.getElementById('captchaSlider');
const btn = document.getElementById('captchaBtn');
const error = document.getElementById('captchaError');

// random rotation
let targetRotation = Math.floor(Math.random() * 360);
img.style.transform = `rotate(${targetRotation}deg)`;

slider.addEventListener('input', () => {
  img.style.transform = `rotate(${targetRotation - slider.value}deg)`;
});

btn.addEventListener('click', () => {
  const diff = Math.abs(targetRotation - slider.value) % 360;
  if (diff < 15 || diff > 345) {
    captchaScreen.classList.add('hidden');
    sessionStorage.setItem('jettonCaptchaPassed', '1');
  } else {
    error.textContent = 'Попробуй выровнять точнее';
  }
});

if (sessionStorage.getItem('jettonCaptchaPassed') === '1') {
  captchaScreen.classList.add('hidden');
}

// tracking clicks
document.querySelectorAll('a').forEach((button) => {
  button.addEventListener('click', () => {
    console.log('CTA click:', button.href);
  });
});
    });

    document.querySelectorAll('a').forEach((button) => {
      button.addEventListener('click', () => {
        console.log('CTA click:', button.href);
      });
    });
  </script>
</body>
</html>
